apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: papermap-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: papermap
  labels:
    app: papermap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: papermap
  template:
    metadata:
      labels:
        app: papermap
    spec:
      containers:
        - name: papermap
          image: ghcr.io/mzen17/papermap:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: sqlite:////db/papermap.db
          volumeMounts:
            - name: db
              mountPath: /db
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: papermap-db

---
apiVersion: v1
kind: Service
metadata:
  name: papermap
spec:
  type: LoadBalancer
  selector:
    app: papermap
  ports:
    - protocol: TCP
      port: 9012
      targetPort: 8000
