apiVersion: v1
kind: Namespace
metadata:
  name: papermap

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: papermap-db
  namespace: papermap
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: papermap
  namespace: papermap
  labels:
    app: papermap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: papermap
  template:
    metadata:
      labels:
        app: papermap
    spec:
      containers:
        - name: papermap
          image: your-registry/papermap:latest  # replace with your image
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: sqlite:////db/papermap.db
          volumeMounts:
            - name: db
              mountPath: /db
          readinessProbe:
            httpGet:
              path: /me
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            # /me returns 401 (not 2xx) when unauthenticated, so check for that
            # alternatively swap for a /healthz if you add one
          livenessProbe:
            httpGet:
              path: /me
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: papermap-db

---
apiVersion: v1
kind: Service
metadata:
  name: papermap
  namespace: papermap
spec:
  selector:
    app: papermap
  ports:
    - port: 80
      targetPort: 8000

---
# k3s ships Traefik as the ingress controller
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: papermap
  namespace: papermap
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # uncomment to enable TLS via cert-manager / Let's Encrypt:
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: papermap.example.com  # replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: papermap
                port:
                  number: 80
  # uncomment for TLS:
  # tls:
  #   - hosts:
  #       - papermap.example.com
  #     secretName: papermap-tls
