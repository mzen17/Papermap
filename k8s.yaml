apiVersion: v1
kind: Namespace
metadata:
  name: papermap

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: papermap-db
  namespace: papermap
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: papermap
  namespace: papermap
  labels:
    app: papermap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: papermap
  template:
    metadata:
      labels:
        app: papermap
    spec:
      containers:
        - name: papermap
          image: your-registry/papermap:latest  # replace with your image
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: sqlite:////db/papermap.db
          volumeMounts:
            - name: db
              mountPath: /db
          readinessProbe:
            httpGet:
              path: /me
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            # /me returns 401 (not 2xx) when unauthenticated, so check for that
            # alternatively swap for a /healthz if you add one
          livenessProbe:
            httpGet:
              path: /me
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: db
          persistentVolumeClaim:
            claimName: papermap-db

---
apiVersion: v1
kind: Service
metadata:
  name: papermap
  namespace: papermap
spec:
  type: NodePort
  selector:
    app: papermap
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 9012
