<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
    
    <filter id="shadow-light" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.1" />
    </filter>
    
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    
    <linearGradient id="scrollGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="20%" stop-color="#f8fafc" />
      <stop offset="80%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>

    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
  </defs>

  <rect x="110" y="130" width="280" height="240" fill="url(#paperGrad)" />

  <g stroke="#cbd5e1" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 110 180 Q 180 150 250 220 T 390 190" />
    <path d="M 110 240 Q 170 290 230 250 T 390 280" />
    <path d="M 110 300 Q 150 330 200 310 T 390 350" />
    <path d="M 180 130 Q 140 250 190 370" />
    <path d="M 310 130 Q 340 250 290 370" />
  </g>

  <path d="M 140 320 Q 170 270 220 290 T 270 190 Q 290 160 330 210" 
        fill="none" 
        stroke="#3b82f6" 
        stroke-width="6" 
        stroke-dasharray="10 10" 
        stroke-linecap="round" />

  <g filter="url(#shadow-light)">
    <rect x="80" y="100" width="340" height="46" rx="23" fill="url(#scrollGrad)" />
    <ellipse cx="103" cy="123" rx="10" ry="15" fill="#94a3b8" opacity="0.3" />
    <path d="M 103 108 A 15 15 0 0 0 103 138 A 8 8 0 0 0 103 115" fill="none" stroke="#64748b" stroke-width="2" opacity="0.7"/>
  </g>

  <g filter="url(#shadow-light)">
    <rect x="80" y="350" width="340" height="46" rx="23" fill="url(#scrollGrad)" />
    <ellipse cx="397" cy="373" rx="10" ry="15" fill="#94a3b8" opacity="0.3" />
    <path d="M 397 358 A 15 15 0 0 1 397 388 A 8 8 0 0 1 397 365" fill="none" stroke="#64748b" stroke-width="2" opacity="0.7"/>
  </g>

  <g transform="translate(330, 210)" filter="url(#shadow)">
    <ellipse cx="0" cy="25" rx="12" ry="4" fill="#0f172a" opacity="0.3" />
    <path d="M 0 25 C -18 8 -24 -2 -24 -18 A 24 24 0 1 1 24 -18 C 24 -2 18 8 0 25 Z" fill="url(#pinGrad)" />
    <circle cx="0" cy="-18" r="8" fill="#ffffff" />
  </g>


</svg>
